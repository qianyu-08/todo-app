<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ToDo App</title>
  <meta name="description" content="シンプルで使いやすい ToDo アプリ" />
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #e5e7eb;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --danger: #dc2626;
      --danger-hover: #b91c1c;
      --success: #16a34a;
      --shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
      --radius: 18px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
      background: linear-gradient(180deg, #eef4ff 0%, var(--bg) 100%);
      color: var(--text);
      min-height: 100vh;
    }

    .app {
      max-width: 760px;
      margin: 0 auto;
      padding: 32px 16px 48px;
    }

    .hero {
      margin-bottom: 20px;
      text-align: center;
    }

    .hero h1 {
      margin: 0 0 8px;
      font-size: clamp(2rem, 4vw, 3rem);
      letter-spacing: 0.02em;
    }

    .hero p {
      margin: 0;
      color: var(--muted);
      font-size: 0.98rem;
    }

    .card {
      background: var(--card);
      border: 1px solid rgba(229, 231, 235, 0.9);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px;
      margin-bottom: 16px;
    }

    .input-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
    }

    .input-row input {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid var(--line);
      border-radius: 14px;
      font-size: 1rem;
      outline: none;
      transition: border-color .15s ease, box-shadow .15s ease;
      background: #fff;
    }

    .input-row input:focus {
      border-color: rgba(37, 99, 235, 0.5);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
    }

    button {
      border: 0;
      border-radius: 14px;
      padding: 12px 16px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform .08s ease, background .15s ease, opacity .15s ease;
    }

    button:active { transform: translateY(1px); }

    .btn-primary {
      background: var(--primary);
      color: white;
    }
    .btn-primary:hover { background: var(--primary-hover); }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: space-between;
      align-items: center;
    }

    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .filter-btn, .secondary-btn {
      background: #eef2ff;
      color: #1e3a8a;
    }

    .filter-btn.active {
      background: #dbeafe;
      color: #1d4ed8;
      box-shadow: inset 0 0 0 1px rgba(37, 99, 235, 0.18);
    }

    .danger-btn {
      background: #fee2e2;
      color: #991b1b;
    }
    .danger-btn:hover { background: #fecaca; }

    .stats {
      color: var(--muted);
      font-size: 0.95rem;
    }

    ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .todo-list li {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 14px 12px;
      border-bottom: 1px solid var(--line);
    }

    .todo-list li:last-child {
      border-bottom: none;
    }

    .todo-check {
      width: 20px;
      height: 20px;
      accent-color: var(--success);
      cursor: pointer;
    }

    .todo-text {
      word-break: break-word;
      line-height: 1.5;
    }

    .todo-text.completed {
      text-decoration: line-through;
      color: var(--muted);
    }

    .todo-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .icon-btn {
      min-width: 44px;
      padding: 10px 12px;
      border-radius: 12px;
      background: #f3f4f6;
      color: #374151;
    }

    .icon-btn:hover {
      background: #e5e7eb;
    }

    .icon-btn.delete {
      background: #fee2e2;
      color: #991b1b;
    }

    .icon-btn.delete:hover {
      background: #fecaca;
    }

    .empty {
      padding: 26px 12px;
      color: var(--muted);
      text-align: center;
    }

    .footer-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 14px;
      flex-wrap: wrap;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 640px) {
      .input-row {
        grid-template-columns: 1fr;
      }

      .todo-list li {
        grid-template-columns: auto 1fr;
      }

      .todo-actions {
        grid-column: 2 / -1;
        justify-content: flex-start;
      }

      .controls {
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="hero">
      <h1>ToDo App</h1>
      <p>シンプルに追加して、終わったら消す。文明の基本です。</p>
    </header>

    <section class="card" aria-labelledby="input-heading">
      <h2 id="input-heading" class="sr-only">タスク追加</h2>
      <form id="todo-form" class="input-row">
        <label class="sr-only" for="todo-input">新しいタスク</label>
        <input id="todo-input" type="text" placeholder="新しいタスクを入力" autocomplete="off" />
        <button class="btn-primary" type="submit">追加</button>
      </form>
    </section>

    <section class="card" aria-labelledby="control-heading">
      <h2 id="control-heading" class="sr-only">表示と操作</h2>
      <div class="controls">
        <div class="filters" role="tablist" aria-label="フィルター">
          <button class="filter-btn active" data-filter="all" type="button">すべて</button>
          <button class="filter-btn" data-filter="active" type="button">未完了</button>
          <button class="filter-btn" data-filter="completed" type="button">完了</button>
        </div>
        <div class="stats" id="stats">0 件</div>
      </div>

      <ul id="todo-list" class="todo-list" aria-live="polite"></ul>

      <div class="footer-actions">
        <button id="clear-completed" class="secondary-btn" type="button">完了を削除</button>
        <button id="clear-all" class="danger-btn" type="button">すべて削除</button>
      </div>
    </section>
  </main>

  <script>
    const STORAGE_KEY = "todo-app-items-v1";

    const form = document.getElementById("todo-form");
    const input = document.getElementById("todo-input");
    const list = document.getElementById("todo-list");
    const stats = document.getElementById("stats");
    const clearCompletedBtn = document.getElementById("clear-completed");
    const clearAllBtn = document.getElementById("clear-all");
    const filterButtons = document.querySelectorAll(".filter-btn");

    let todos = loadTodos();
    let currentFilter = "all";

    function loadTodos() {
      try {
        const saved = localStorage.getItem(STORAGE_KEY);
        return saved ? JSON.parse(saved) : [];
      } catch {
        return [];
      }
    }

    function saveTodos() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(todos));
    }

    function createTodo(text) {
      return {
        id: crypto.randomUUID ? crypto.randomUUID() : String(Date.now() + Math.random()),
        text: text.trim(),
        completed: false,
        createdAt: Date.now(),
      };
    }

    function getFilteredTodos() {
      if (currentFilter === "active") return todos.filter(todo => !todo.completed);
      if (currentFilter === "completed") return todos.filter(todo => todo.completed);
      return todos;
    }

    function render() {
      const filtered = getFilteredTodos();
      list.innerHTML = "";

      const total = todos.length;
      const completed = todos.filter(todo => todo.completed).length;
      const active = total - completed;
      stats.textContent = `${total} 件 / 未完了 ${active} 件 / 完了 ${completed} 件`;

      if (filtered.length === 0) {
        const empty = document.createElement("li");
        empty.className = "empty";
        empty.textContent = currentFilter === "all"
          ? "タスクはまだありません。人類はまず入力欄を埋めるところから始めます。"
          : "この条件に合うタスクはありません。";
        list.appendChild(empty);
        return;
      }

      filtered.forEach(todo => {
        const li = document.createElement("li");

        const checkbox = document.createElement("input");
        checkbox.type = "checkbox";
        checkbox.className = "todo-check";
        checkbox.checked = todo.completed;
        checkbox.setAttribute("aria-label", `タスク「${todo.text}」を完了にする`);
        checkbox.addEventListener("change", () => toggleTodo(todo.id));

        const text = document.createElement("span");
        text.className = "todo-text" + (todo.completed ? " completed" : "");
        text.textContent = todo.text;

        const actions = document.createElement("div");
        actions.className = "todo-actions";

        const editBtn = document.createElement("button");
        editBtn.type = "button";
        editBtn.className = "icon-btn";
        editBtn.textContent = "編集";
        editBtn.addEventListener("click", () => editTodo(todo.id));

        const deleteBtn = document.createElement("button");
        deleteBtn.type = "button";
        deleteBtn.className = "icon-btn delete";
        deleteBtn.textContent = "削除";
        deleteBtn.addEventListener("click", () => deleteTodo(todo.id));

        actions.append(editBtn, deleteBtn);
        li.append(checkbox, text, actions);
        list.appendChild(li);
      });
    }

    function addTodo(text) {
      const trimmed = text.trim();
      if (!trimmed) return;
      todos.unshift(createTodo(trimmed));
      saveTodos();
      render();
    }

    function toggleTodo(id) {
      todos = todos.map(todo =>
        todo.id === id ? { ...todo, completed: !todo.completed } : todo
      );
      saveTodos();
      render();
    }

    function deleteTodo(id) {
      todos = todos.filter(todo => todo.id !== id);
      saveTodos();
      render();
    }

    function editTodo(id) {
      const target = todos.find(todo => todo.id === id);
      if (!target) return;

      const nextText = prompt("タスクを編集", target.text);
      if (nextText === null) return;

      const trimmed = nextText.trim();
      if (!trimmed) return;

      target.text = trimmed;
      saveTodos();
      render();
    }

    form.addEventListener("submit", (e) => {
      e.preventDefault();
      addTodo(input.value);
      input.value = "";
      input.focus();
    });

    clearCompletedBtn.addEventListener("click", () => {
      todos = todos.filter(todo => !todo.completed);
      saveTodos();
      render();
    });

    clearAllBtn.addEventListener("click", () => {
      if (todos.length === 0) return;
      const ok = confirm("すべてのタスクを削除しますか？");
      if (!ok) return;
      todos = [];
      saveTodos();
      render();
    });

    filterButtons.forEach(button => {
      button.addEventListener("click", () => {
        filterButtons.forEach(btn => btn.classList.remove("active"));
        button.classList.add("active");
        currentFilter = button.dataset.filter;
        render();
      });
    });

    render();
  </script>
</body>
</html>
